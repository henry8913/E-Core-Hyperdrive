services:
  ecore:
    container_name: ecore
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - ASPNETCORE_HTTP_PORTS=5000
    networks:
      - npm_default

networks:
  npm_default:
    external: true
    name: npm_default