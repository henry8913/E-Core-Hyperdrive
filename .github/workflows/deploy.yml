name: Deploy Project

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /var/www/E-Core-Hyperdrive

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            sudo -n docker compose down --remove-orphans || true
            sudo -n docker compose up -d --build